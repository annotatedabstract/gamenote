[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# Defaults (E4/E7/E9 + Pyflakes) plus import-sorting (I), bugbear (B), and
# pyupgrade (UP).
extend-select = ["I", "B", "UP"]

[tool.ruff.format]
# black-compatible; run `ruff format` to apply.

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q"
